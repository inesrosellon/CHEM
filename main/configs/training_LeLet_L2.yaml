  # Training configuration
  GPU: [0,1,2,3]

  VERBOSE: False

  SWINUNET:
    MODEL_NAME: 'LearnLet'    
    IMG_SIZE: 128
    PATCH_SIZE: 4
    IN_CHANS: 1
    OUT_CHANS: 1
    WIN_SIZE: 8
    EMB_DIM: 96
    DEPTH_EN: [8, 8, 8, 8]
    HEAD_NUM: [8, 8, 8, 8]
    MLP_RATIO: 4.0
    QKV_BIAS: True
    QK_SCALE: 8
    DROP_RATE: 0.
    ATTN_DROP_RATE: 0.
    DROP_PATH_RATE: 0.1
    APE: False
    PATCH_NORM: True
    USE_CHECKPOINTS: False
    FINAL_UPSAMPLE: 'bilinear'

  MODEL:
    MODE: 'Denoising'

  # Optimization arguments.
  OPTIM:
    BATCH: 4
    EPOCHS: 500      
    # EPOCH_DECAY: [10]
    LR_INITIAL: 2e-4
    LR_MIN: 1e-6
    # BETA1: 0.9

  TRAINING:
    LOSS: 'L2_Loss'  
    VAL_AFTER_EVERY: 1
    RESUME: False
    TRAIN_PS: 256
    VAL_PS: 256
    SAVE_DIR: 'src/models'           # path to save models and images